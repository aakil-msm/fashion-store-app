name: fdilu_fashion_store
description: F-Dilu Fashion Store - A complete Flutter fashion e-commerce app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.6 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  google_fonts: ^5.1.0
  provider: ^6.1.5+1

  # ---- Firebase ----
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - images/products/
    - images/cats/